    M150 180
    Q150 150 180 150
    L230 150
    Q260 150 260 180
    L260 330
    Q260 360 290 360
    Q320 360 320 330
    L320 180
    Q320 150 350 150
    L400 150
    Q430 150 430 180
    L430 420
    Q430 460 390 460
    L360 460
    Q320 460 300 420
    Q280 460 240 460
    L210 460
    Q170 460 170 420
    Z
  " fill="#D9D9D9"></path>

  <!-- Folded Corner -->
